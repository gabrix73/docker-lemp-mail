# ClamAV — clamd.conf

# Logging
LogFile /var/log/clamav/clamd.log
LogFileMaxSize 10M
LogTime yes
LogVerbose no
LogSyslog no
PidFile /run/clamav/clamd.pid

# TCP socket (used by Rspamd for scanning)
TCPSocket 3310
TCPAddr 0.0.0.0

# Database
DatabaseDirectory /var/lib/clamav

# Scanning
ScanMail yes
ScanArchive yes
ScanHTML yes
ScanPE yes
ScanOLE2 yes
ScanPDF yes
ScanSWF yes
ScanXMLDOCS yes
ScanHWP3 yes

# Limits (avoid scanning very large files)
MaxFileSize 25M
MaxScanSize 100M
MaxRecursion 10
MaxFiles 15000
MaxEmbeddedPE 10M
MaxHTMLNormalize 10M
MaxHTMLNoTags 2M
MaxScriptNormalize 5M
MaxZipTypeRcg 1M

# DB update
# (handled by freshclam separately in the official image)

# User
User clamav

# Performance
MaxThreads 4
ReadTimeout 300
CommandReadTimeout 30
SendBufTimeout 200
MaxQueue 200
IdleTimeout 30
