# ─────────────────────────────────────────────────────────────
# OpenDMARC — milter configuration
# ─────────────────────────────────────────────────────────────

# Milter socket
Socket                  inet:8893@0.0.0.0

# Syslog
Syslog                  true

# Action on DMARC failure: none (report only), quarantine, reject
# In production use reject after monitoring period
RejectFailures          false

# Ignore authentication failure for internal hosts
IgnoreAuthenticatedClients true

# Trusted hosts (do not apply DMARC policy)
TrustedAuthservIDs      MAIL_DOMAIN_PLACEHOLDER

# History storage (optional — DB for aggregate reports)
# HistoryFile           /var/run/opendmarc/opendmarc.dat

# DMARC aggregate reports (rua)
# EnableCoredumps       false
# RecordAllMessages     false

# User
UserID                  opendmarc
