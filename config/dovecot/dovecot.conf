# ─────────────────────────────────────────────────────────────
# Dovecot — main configuration
# ─────────────────────────────────────────────────────────────

protocols = imap pop3 lmtp sieve

# Logging
log_path = /dev/stderr
info_log_path = /dev/stdout
debug_log_path = /dev/stdout

# SSL/TLS
ssl = required
ssl_cert = </etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem
ssl_key  = </etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem
ssl_min_protocol = TLSv1.2
ssl_cipher_list = ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20:!aNULL:!MD5:!DSS
ssl_prefer_server_ciphers = yes

# Auth
auth_mechanisms = plain login
disable_plaintext_auth = yes

# Mailbox format: Maildir
mail_location = maildir:/var/mail/%d/%n/Maildir
mail_privileged_group = mail

# Inbox namespace
namespace inbox {
  inbox = yes
  separator = /
  mailbox Drafts    { special_use = \Drafts;    auto = subscribe }
  mailbox Junk      { special_use = \Junk;      auto = subscribe }
  mailbox Sent      { special_use = \Sent;      auto = subscribe }
  mailbox Trash     { special_use = \Trash;     auto = subscribe }
  mailbox Archive   { special_use = \Archive;   auto = subscribe }
}

# SQL auth (users in MySQL)
passdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}
userdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}

# LMTP (receives from Postfix)
service lmtp {
  inet_listener lmtp {
    address = 0.0.0.0
    port = 24
  }
}

# SASL auth socket for Postfix
service auth {
  inet_listener {
    port = 12345
  }
  unix_listener auth-userdb {
    mode = 0600
  }
}

service auth-worker {
  user = $default_internal_user
}

# IMAP
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
  process_min_avail = 1
}

# POP3
service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
}

# Sieve (mail filters)
service managesieve-login {
  inet_listener sieve {
    port = 4190
  }
}

plugin {
  sieve = file:~/sieve;active=~/.dovecot.sieve
  sieve_global = /var/lib/dovecot/sieve/global/
}

# Quota
plugin {
  quota = maildir:User quota
  quota_rule = *:storage=1G
  quota_warning = storage=95%% quota-warning 95 %u
  quota_warning2 = storage=80%% quota-warning 80 %u
}

# Anti-brute-force
auth_failure_delay = 2 secs

# Connection limits
default_process_limit = 100
default_client_limit = 1000
mail_max_userip_connections = 10
