# Rspamd — milter headers
# Adds X-Spam headers and manages the milter towards Postfix

use = ["x-spamd-bar", "x-spam-level", "x-spam-status", "spam-header", "authentication-results"];

# Message actions
routines {
  spam-header {
    header = "X-Spam";
    value = "Yes";
    remove = 1;
  }
  x-spam-status {
    remove = 1;
  }
  x-spam-level {
    char = "*";
    remove = 1;
  }
  authentication-results {
    remove = 1;
    # Adds Authentication-Results header
    add_smtp_user = true;
  }
}

# Action thresholds
# score >= 6  → rewrite subject
# score >= 10 → reject
# score >= 15 → reject hard
