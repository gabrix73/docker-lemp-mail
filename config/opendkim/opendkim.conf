# ─────────────────────────────────────────────────────────────
# OpenDKIM — milter configuration
# ─────────────────────────────────────────────────────────────

# Mode: sign (s) + verify (v)
Mode                    sv

# Milter socket (Postfix connects here)
Socket                  inet:8891@0.0.0.0

# Syslog
Syslog                  yes
SyslogSuccess           yes
LogWhy                  yes

# Canonicalization
Canonicalization        relaxed/relaxed

# Signing algorithm
SignatureAlgorithm      rsa-sha256

# Domain and selector
Domain                  DOMAIN_PLACEHOLDER
Selector                mail
KeyFile                 /etc/opendkim/keys/DOMAIN_PLACEHOLDER/mail.private

# Trusted hosts (do not sign internal mail)
InternalHosts           /etc/opendkim/TrustedHosts
ExternalIgnoreList      /etc/opendkim/TrustedHosts

# Tables (for future multi-domain support)
# KeyTable               /etc/opendkim/KeyTable
# SigningTable           /etc/opendkim/SigningTable

# DKIM requirements
MinimumKeyBits          1024

# Verification
OversignHeaders         From

# Umask
UMask                   007

# User
UserID                  opendkim
